$schema: "http://json-schema.org/draft-07/schema"
title: Team member ID card
description: >
  This is the schema for the team member ID cards contained in the present
  folder.
type: object
properties:
  name:
    description: >
      Your name. It is only used for display and thus doesn't have to match your
      administrative name.
    type: string
  position:
    description: >
      One or more positions held in the team. Add a new entry when you take on
      a new role; add an `end` date to mark a position (or your time in the
      team) as finished.
    type: array
    items:
      type: object
      properties:
        type:
          type: string
          enum: [Staff, PhD, Visitor]
        start:
          type: string
          format: date
        end:
          type: string
          format: date
      required:
        - type
        - start
  github:
    description: Your github username (*without* the '@')
    type: string
    pattern: ^[^@]+
  twitter:
    description: Your twitter username (with and without @ both work)
    type: string
  bluesky:
    description: Your BlueSky username (e.g. `sbfnk.bluesky.social`)
    type: string
  orcid:
    description: Your ORCiD
    type: string
    pattern: ^\d{4}-\d{4}-\d{4}-\d{3}(X|\d)$
  description:
    description: A short text about yourself and your work within the team.
    type: string
  webpage:
    description: A link to your personal webpage
    type: string
    format: uri
required:
  - name
  - position
